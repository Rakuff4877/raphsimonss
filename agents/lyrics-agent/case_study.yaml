title: "TikTok Lyric Video Generator"
tagline: "Paste an Apple Music link — get a cinematic AI lyric video ready to upload to TikTok"
category: "Content Creation"
tech_stack: [Python, Higgsfield AI, LRCLib, Pillow, ffmpeg]
complexity: "Medium"
status: "Live"
demo_url: ""
github_url: ""
cover_image_url: ""

problem: |
  Creating lyric videos for TikTok is tedious: find the lyrics, time each line manually,
  source or generate a video background, composite the text, export in the right format.
  Doing this well takes video editing skills and 30–60 minutes per song. Most creators
  either skip it or use low-quality template apps with no visual originality.

solution: |
  A Python agent that takes an Apple Music URL (or song + artist name) and produces a
  finished, upload-ready TikTok lyric video in under 2 minutes. It fetches timestamped
  lyrics automatically, generates a unique cinematic AI video background via Higgsfield,
  and burns the lyrics onto the video with precise karaoke-style timing using ffmpeg.
  The output is a silent 9:16 MP4 — drop it into TikTok's editor, add the song, post.

architecture: |
  Step 1 — Song resolution: Accepts either an Apple Music URL (parsed to extract song
  title and artist) or explicit --song / --artist flags.

  Step 2 — Lyrics fetch: Queries LRCLib's open API for synced LRC lyrics (timestamped
  to the millisecond). Parses each [mm:ss.xx] timestamp into a LyricLine with start,
  end, and text fields. Caps output at a configurable duration (default: 45 seconds).

  Step 3 — AI video generation: Submits a text-to-video job to Higgsfield AI with a
  randomly selected cinematic prompt from a curated library of 12 (covering coastal
  drives, landscapes, urban rooftops, intimate scenes). Generates at 1080p, 9:16 aspect
  ratio, 5 or 10 seconds. Polls for completion and downloads the raw MP4.

  Step 4 — Compositing: Loops the raw AI clip to match the full lyric duration using
  ffmpeg stream copy (no re-encode). Renders each lyric line as a full-frame transparent
  PNG using Pillow with the Bebas Neue font, word-wrapped to fit the frame, with cream
  text and a drop shadow. Chains all PNGs into an ffmpeg filter_complex overlay with
  precise enable='between(t,start,end)' timing. Outputs final MP4 at CRF 18.

  The --skip-generate flag lets you reuse an existing raw clip to iterate on text
  styling without burning Higgsfield credits.

results: |
  - Full lyric video produced in under 2 minutes end-to-end
  - Zero manual timing — LRC timestamps drive every line automatically
  - Each video gets a unique AI background from 12 cinematic prompt templates
  - Output tested on multiple songs across genres (The Weeknd, Fred again..,
    Charlotte Day Wilson, Gotts Street Park)
  - TikTok-native format (9:16, 1080p) requires no post-processing before upload
